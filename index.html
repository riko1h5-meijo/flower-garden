<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>花畑の朝</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div style="position: relative;">

  <img class="bg" id="back" src="bg0.png">

  <!-- foo は bg0 と bg1 の間に置く（＝bg0 の前・bg1 の後ろ） -->
  <img class="foo" src="foo.gif">
  <img class="foo" src="foo.gif">
  <img class="foo" src="foo.gif">
  <img class="foo" src="foo.gif">
  <img class="foo" src="foo.gif">

  <!-- 表画像（front）。上からでも裏の foo にマウスが届くよう、style.css で pointer-events:none -->
  <img class="bg" id="front" src="bg1.png">

  <p id="message">
    ぽかぽか陽気の穏やかな朝<br>
    花畑では、蝶々がのんびり飛んでいます
  </p>

  <img class="butterfly" src="butterfly.gif">
  <img class="butterfly" src="butterfly.gif">
  <img class="butterfly" src="butterfly.gif">

</div>

<script src="script.js"></script>

</body>
</html>
